version: "3.9"
services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: adminCun
      POSTGRES_PASSWORD: Cun2024!
      POSTGRES_DB: cundb
    ports:
      - "5499:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adminCun"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    container_name: nest_api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/prisma/seed.js && npm run start:prod"
    env_file:
      - .env

volumes:
  pgdata: